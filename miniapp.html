<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test de Inglés Premium</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#2563eb,#4f46e5);
min-height:100vh;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#111827;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:20px;
}

.progress{
height:12px;
background:#e5e7eb;
border-radius:30px;
overflow:hidden;
margin-bottom:25px;
}

.progress-bar{
height:100%;
width:0%;
background:#2563eb;
transition:.4s;
}

.question{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
color:#111827;
}

button{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.hidden{
display:none;
}

input{
width:100%;
padding:15px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
}

.result{
text-align:center;
}

.score{
font-size:28px;
font-weight:bold;
margin:15px 0;
color:#2563eb;
}

.cta{
background:#22c55e;
font-size:18px;
font-weight:bold;
}

.badge{
background:#eff6ff;
padding:10px;
border-radius:12px;
text-align:center;
margin-bottom:20px;
color:#1d4ed8;
font-weight:bold;
}
</style></head><body><div class="container"><div id="start"><h1>Descubre tu nivel real de inglés</h1><p class="subtitle">
Más de 4.800 personas ya hicieron este test gratuito.
</p><div class="badge">
⏱️ Solo te llevará 60 segundos
</div><button onclick="startQuiz()">
🚀 Empezar Test
</button></div><div id="quiz" class="hidden"><div class="progress">
<div class="progress-bar" id="bar"></div>
</div><div id="question" class="question"></div><div id="answers"></div></div><div id="lead" class="hidden"><h2>🎁 Tu resultado está listo</h2><p style="margin:15px 0;">
Completa tus datos para verlo.
</p><input type="text" placeholder="Tu nombre"><input type="tel" placeholder="WhatsApp (opcional)"><button onclick="showResult()">
Ver mi resultado
</button></div><div id="result" class="hidden result"><h2 id="title"></h2><div id="score" class="score"></div><p id="text"></p><br><button class="cta"
onclick="window.location.href='https://impulso360.github.io/ingles-natural/'">
🎁 VER CLASE GRATIS
</button>

</div></div><script>

const questions = [

{
q:"¿Qué significa Good Morning?",
a:["Buenos días","Buenas noches","Gracias"],
c:0
},

{
q:"¿Qué significa Thank You?",
a:["Hola","Gracias","Por favor"],
c:1
},

{
q:"¿Qué significa How are you?",
a:["¿Cómo estás?","¿Dónde vives?","¿Qué hora es?"],
c:0
},

{
q:"¿Qué significa See you later?",
a:["Hasta luego","Buenos días","Bienvenido"],
c:0
},

{
q:"¿Qué significa I love learning English?",
a:["Amo aprender inglés","Quiero viajar","Tengo hambre"],
c:0
}

];

let current=0;
let points=0;

function startQuiz(){

document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");

loadQuestion();

}

function loadQuestion(){

document.getElementById("question").innerText=
questions[current].q;

let html="";

questions[current].a.forEach((item,index)=>{

html +=
`<button onclick="answer(${index})">${item}</button>`;

});

document.getElementById("answers").innerHTML=html;

document.getElementById("bar").style.width=
((current)/questions.length)*100+"%";

}

function answer(index){

if(index===questions[current].c){

points++;

}

current++;

if(current<questions.length){

loadQuestion();

}else{

document.getElementById("quiz").classList.add("hidden");
document.getElementById("lead").classList.remove("hidden");

}

}

function showResult(){

document.getElementById("lead").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

document.getElementById("score").innerText=
points+" / "+questions.length;

if(points<=2){

document.getElementById("title").innerText=
"Nivel Principiante";

document.getElementById("text").innerText=
"Tienes margen para mejorar rápidamente con el método adecuado.";

}

else if(points<=4){

document.getElementById("title").innerText=
"Nivel Intermedio";

document.getElementById("text").innerText=
"Ya tienes una base interesante. Ahora toca ganar fluidez.";

}

else{

document.getElementById("title").innerText=
"¡Excelente!";

document.getElementById("text").innerText=
"Tienes una buena base. Aprende cómo avanzar aún más rápido.";

}

}

</script></body>
</html>
